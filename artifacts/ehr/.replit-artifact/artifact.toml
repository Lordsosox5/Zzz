kind = "web"
previewPath = "/"
title = "Almuzini Children Hospital EHR"
version = "1.0.0"
id = "artifacts/ehr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19866

[services.development]
run = "pnpm --filter @workspace/ehr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ehr", "run", "build" ]
publicDir = "artifacts/ehr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19866"
BASE_PATH = "/"
