openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Almuzini Children Hospital EHR API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: patients
  - name: appointments
  - name: clinical
  - name: prescriptions
  - name: lab
  - name: radiology
  - name: billing
  - name: pharmacy
  - name: staff
  - name: dashboard
  - name: vaccinations
  - name: growth

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # PATIENTS
  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientListResponse"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}/summary:
    get:
      operationId: getPatientSummary
      tags: [patients]
      summary: Get patient clinical summary
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Patient summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientSummary"

  # APPOINTMENTS
  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - name: date
          in: query
          schema: { type: string }
        - name: doctorId
          in: query
          schema: { type: integer }
        - name: patientId
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get appointment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/today:
    get:
      operationId: getTodayAppointments
      tags: [appointments]
      summary: Get today's appointments
      responses:
        "200":
          description: Today's appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

  # CLINICAL NOTES
  /clinical-notes:
    get:
      operationId: listClinicalNotes
      tags: [clinical]
      summary: List clinical notes
      parameters:
        - name: patientId
          in: query
          schema: { type: integer }
        - name: type
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Clinical notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClinicalNote"
    post:
      operationId: createClinicalNote
      tags: [clinical]
      summary: Create clinical note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClinicalNoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicalNote"

  /clinical-notes/{id}:
    get:
      operationId: getClinicalNote
      tags: [clinical]
      summary: Get clinical note
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Clinical note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicalNote"
    patch:
      operationId: updateClinicalNote
      tags: [clinical]
      summary: Update clinical note
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClinicalNoteUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicalNote"

  # DIAGNOSES
  /diagnoses:
    get:
      operationId: listDiagnoses
      tags: [clinical]
      summary: List diagnoses for a patient
      parameters:
        - name: patientId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Diagnoses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Diagnosis"
    post:
      operationId: createDiagnosis
      tags: [clinical]
      summary: Create diagnosis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosisInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnosis"

  # PRESCRIPTIONS
  /prescriptions:
    get:
      operationId: listPrescriptions
      tags: [prescriptions]
      summary: List prescriptions
      parameters:
        - name: patientId
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Prescriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prescription"
    post:
      operationId: createPrescription
      tags: [prescriptions]
      summary: Create prescription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrescriptionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prescription"

  /prescriptions/{id}:
    get:
      operationId: getPrescription
      tags: [prescriptions]
      summary: Get prescription
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Prescription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prescription"
    patch:
      operationId: updatePrescription
      tags: [prescriptions]
      summary: Update prescription status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrescriptionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prescription"

  # LAB ORDERS
  /lab-orders:
    get:
      operationId: listLabOrders
      tags: [lab]
      summary: List lab orders
      parameters:
        - name: patientId
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Lab orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LabOrder"
    post:
      operationId: createLabOrder
      tags: [lab]
      summary: Create lab order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LabOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabOrder"

  /lab-orders/{id}:
    get:
      operationId: getLabOrder
      tags: [lab]
      summary: Get lab order
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Lab order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabOrder"
    patch:
      operationId: updateLabOrder
      tags: [lab]
      summary: Update lab order / add results
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LabOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabOrder"

  # RADIOLOGY
  /radiology-orders:
    get:
      operationId: listRadiologyOrders
      tags: [radiology]
      summary: List radiology orders
      parameters:
        - name: patientId
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Radiology orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RadiologyOrder"
    post:
      operationId: createRadiologyOrder
      tags: [radiology]
      summary: Create radiology order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RadiologyOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadiologyOrder"

  /radiology-orders/{id}:
    patch:
      operationId: updateRadiologyOrder
      tags: [radiology]
      summary: Update radiology order / add report
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RadiologyOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadiologyOrder"

  # BILLING
  /invoices:
    get:
      operationId: listInvoices
      tags: [billing]
      summary: List invoices
      parameters:
        - name: patientId
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [billing]
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [billing]
      summary: Get invoice
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    patch:
      operationId: updateInvoice
      tags: [billing]
      summary: Update invoice
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # PHARMACY / DRUGS
  /drugs:
    get:
      operationId: listDrugs
      tags: [pharmacy]
      summary: List drugs in inventory
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: lowStock
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Drugs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Drug"
    post:
      operationId: createDrug
      tags: [pharmacy]
      summary: Add drug to inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DrugInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drug"

  /drugs/{id}:
    patch:
      operationId: updateDrug
      tags: [pharmacy]
      summary: Update drug
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DrugUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drug"

  # STAFF / USERS
  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List staff members
      parameters:
        - name: role
          in: query
          schema: { type: string }
        - name: department
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /staff/{id}:
    get:
      operationId: getStaffMember
      tags: [staff]
      summary: Get staff member
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update staff member
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  # VACCINATIONS
  /vaccinations:
    get:
      operationId: listVaccinations
      tags: [vaccinations]
      summary: List vaccinations for a patient
      parameters:
        - name: patientId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Vaccinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vaccination"
    post:
      operationId: recordVaccination
      tags: [vaccinations]
      summary: Record vaccination
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaccinationInput"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vaccination"

  # GROWTH CHARTS
  /growth-records:
    get:
      operationId: listGrowthRecords
      tags: [growth]
      summary: List growth records for a patient
      parameters:
        - name: patientId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Growth records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrowthRecord"
    post:
      operationId: createGrowthRecord
      tags: [growth]
      summary: Record growth measurement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrowthRecordInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrowthRecord"

  # DASHBOARD / WOW ENDPOINTS
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/bed-occupancy:
    get:
      operationId: getBedOccupancy
      tags: [dashboard]
      summary: Get bed occupancy status
      responses:
        "200":
          description: Bed occupancy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BedOccupancy"

  /dashboard/alerts:
    get:
      operationId: getDashboardAlerts
      tags: [dashboard]
      summary: Get critical alerts
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /dashboard/revenue:
    get:
      operationId: getRevenueStats
      tags: [dashboard]
      summary: Get revenue statistics
      responses:
        "200":
          description: Revenue stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueStats"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    # AUTH
    LoginInput:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, role, nameEn]
      properties:
        id: { type: integer }
        username: { type: string }
        nameEn: { type: string }
        nameAr: { type: ["string", "null"] }
        role: { type: string }
        department: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        createdAt: { type: string }

    # PATIENTS
    Patient:
      type: object
      required: [id, mrn, nameEn, dateOfBirth, gender, createdAt]
      properties:
        id: { type: integer }
        mrn: { type: string }
        nameEn: { type: string }
        nameAr: { type: ["string", "null"] }
        dateOfBirth: { type: string }
        gender: { type: string }
        bloodGroup: { type: ["string", "null"] }
        nationality: { type: ["string", "null"] }
        nationalId: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        guardianName: { type: ["string", "null"] }
        guardianRelation: { type: ["string", "null"] }
        guardianPhone: { type: ["string", "null"] }
        allergies: { type: ["string", "null"] }
        status: { type: string }
        createdAt: { type: string }

    PatientInput:
      type: object
      required: [nameEn, dateOfBirth, gender]
      properties:
        nameEn: { type: string }
        nameAr: { type: string }
        dateOfBirth: { type: string }
        gender: { type: string }
        bloodGroup: { type: string }
        nationality: { type: string }
        nationalId: { type: string }
        phone: { type: string }
        address: { type: string }
        guardianName: { type: string }
        guardianRelation: { type: string }
        guardianPhone: { type: string }
        allergies: { type: string }

    PatientUpdate:
      type: object
      properties:
        nameEn: { type: string }
        nameAr: { type: string }
        phone: { type: string }
        address: { type: string }
        guardianName: { type: string }
        guardianRelation: { type: string }
        guardianPhone: { type: string }
        allergies: { type: string }
        bloodGroup: { type: string }
        status: { type: string }

    PatientListResponse:
      type: object
      required: [patients, total, page, limit]
      properties:
        patients:
          type: array
          items:
            $ref: "#/components/schemas/Patient"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    PatientSummary:
      type: object
      required: [patient]
      properties:
        patient:
          $ref: "#/components/schemas/Patient"
        recentNotes:
          type: array
          items:
            $ref: "#/components/schemas/ClinicalNote"
        activePrescriptions:
          type: array
          items:
            $ref: "#/components/schemas/Prescription"
